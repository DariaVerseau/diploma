version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=${SERVER_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    working_dir: 
      /app  
    volumes:
      - ./uploads:/app/uploads
      - ./style:/app/style
    depends_on:
      - db
      - ml-service
    networks:
      - image-net
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - image-net
    restart: unless-stopped

  ml-service:
    volumes:
      - ./style:/app/style
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    networks:
      - image-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - image-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  image-net:
    driver: bridge